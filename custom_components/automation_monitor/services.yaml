reset:
  name: Reset
  description: >-
    Clears currently tracked failed automations. With no target, clears all
    of them; with an automation entity given, clears only that one.
  fields:
    entity_id:
      name: Automation
      description: Only clear this automation's failure entry, if present.
      required: false
      example: automation.bewaesserung_garten
      selector:
        entity:
          domain: automation

rebuild_linked_entities:
  name: Rebuild linked entities
  description: >-
    Immediately rebuilds the map of entities referenced by automations/scripts
    used by the "Linked entities unavailable" sensor, instead of waiting for
    the periodic safety-net rebuild. Use this right after editing a script's
    content, since script edits have no dedicated reload event to react to.
